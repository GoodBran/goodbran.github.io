---
layout: default
---

<article class="article">
  <header class="article-header">
    <h1 class="article-title">{{ page.title | escape }}</h1>
    <div class="article-meta">
      <span class="date">{{ page.date | date: "%B %d, %Y" }}</span>
    </div>
  </header>

  <div class="article-content">
    {{ content }}
  </div>

  <footer style="margin-top: 3rem; padding-top: 2rem; border-top: 1px solid #ededf0;">
    <nav style="display: flex; justify-content: space-between; flex-wrap: wrap; gap: 1rem;">
      {% if page.previous.url %}
        <a href="{{ page.previous.url | relative_url }}" style="text-align: left;">
          <span style="display: block; font-size: 0.875rem; color: #9595a3; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem;">Previous</span>
          <span style="font-weight: 600;">{{ page.previous.title | escape }}</span>
        </a>
      {% else %}
        <span></span>
      {% endif %}

      {% if page.next.url %}
        <a href="{{ page.next.url | relative_url }}" style="text-align: right;">
          <span style="display: block; font-size: 0.875rem; color: #9595a3; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem;">Next</span>
          <span style="font-weight: 600;">{{ page.next.title | escape }}</span>
        </a>
      {% endif %}
    </nav>
  </footer>
</article>
