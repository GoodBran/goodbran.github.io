# Site settings
title: Goodbran
email: bran.liang@icloud.com
description: >-
  Writing, publishing, and sharing notes.
  A personal blog about coding, music, and creativity.
# URL settings
# The GitHub Actions workflow auto-configures the base path during build
url: ""
baseurl: ""

# Social
twitter_username: goodbran
github_username: goodbran

# Build settings
# No gem theme - using custom Protocol-inspired theme
theme: null
plugins:
  - jekyll-feed



# Markdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Collections
collections:
  posts:
    output: true
    permalink: /:year/:month/:day/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"

# Exclusions
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - README.md
  - "*.gemspec"
