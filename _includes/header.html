<header class="site-header">
  <div class="container">
    <a href="{{ "/" | relative_url }}" class="site-brand">
      <span class="site-logo">[]</span>
      <span class="site-title-text">{{ site.title | escape }}</span>
    </a>

    <nav class="site-nav" role="navigation" aria-label="Main navigation">
      <a href="{{ "/" | relative_url }}" {% if page.url == "/" %}class="active"{% endif %}>Home</a>
      <a href="{{ "/blog" | relative_url }}" {% if page.url contains "/blog" or page.layout == "post" %}class="active"{% endif %}>Blog</a>
      <a href="{{ "/about" | relative_url }}" {% if page.url == "/about/" %}class="active"{% endif %}>About</a>
    </nav>
  </div>
</header>
